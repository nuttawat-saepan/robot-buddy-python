amcl:
  ros__parameters:
    use_sim_time: false
    base_frame_id: "base_link"
    global_frame_id: "map"
    odom_frame_id: "odom"

    max_particles: 1500
    min_particles: 300

    laser_model_type: "likelihood_field"
    max_beams: 60

    update_min_d: 0.05
    update_min_a: 0.05

    transform_tolerance: 1.0

    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2


bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom

    bt_loop_duration: 10
    default_server_timeout: 20

    default_bt_xml_filename: "navigate_w_replanning_and_recovery.xml"

    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_recovery_node_bt_node
      - nav2_navigate_to_pose_action_bt_node


controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 5.0

    min_x_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001

    failure_tolerance: 0.5

    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.2
      movement_time_allowance: 20.0

    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      stateful: false
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25

    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"

      max_vel_x: 0.4
      min_vel_x: 0.0

      max_vel_theta: 1.2
      min_vel_theta: 0.0

      acc_lim_x: 1.5
      acc_lim_theta: 2.5

      sim_time: 1.5

      vx_samples: 15
      vtheta_samples: 30

      transform_tolerance: 0.2

      xy_goal_tolerance: 0.2
      trans_stopped_velocity: 0.05

      critics: ["RotateToGoal", "ObstacleFootprint", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]

      PathAlign.scale: 20.0
      GoalAlign.scale: 20.0
      PathDist.scale: 20.0
      GoalDist.scale: 20.0
      RotateToGoal.scale: 30.0


local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      global_frame: odom
      robot_base_frame: base_link

      update_frequency: 5.0
      publish_frequency: 2.0

      rolling_window: true
      width: 5
      height: 5
      resolution: 0.05

      footprint: "[[0.35,0.25],[0.35,-0.25],[-0.35,-0.25],[-0.35,0.25]]"

      plugins: ["obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        observation_sources: scan

        scan:
          topic: /scan
          data_type: "LaserScan"
          marking: True
          clearing: True
          obstacle_max_range: 3.0
          raytrace_max_range: 3.5

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.35
        cost_scaling_factor: 2.0


global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      global_frame: map
      robot_base_frame: base_link

      update_frequency: 1.0
      publish_frequency: 1.0

      resolution: 0.05

      footprint: "[[0.35,0.25],[0.35,-0.25],[-0.35,-0.25],[-0.35,0.25]]"

      track_unknown_space: true

      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        observation_sources: scan

        scan:
          topic: /scan
          data_type: "LaserScan"
          marking: True
          clearing: True
          obstacle_max_range: 3.0
          raytrace_max_range: 3.5

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.4
        cost_scaling_factor: 3.0


planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 10.0

    planner_plugins: ["GridBased"]

    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5
      use_astar: true
      allow_unknown: true


recoveries_server:
  ros__parameters:
    use_sim_time: false

    recovery_plugins: ["spin", "backup", "wait"]

    spin:
      plugin: "nav2_recoveries/Spin"

    backup:
      plugin: "nav2_recoveries/BackUp"

    wait:
      plugin: "nav2_recoveries/Wait"

    max_rotational_vel: 1.5
    min_rotational_vel: 0.3


map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: "map.yaml"