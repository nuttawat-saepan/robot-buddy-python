april_localizer:
  ros__parameters:
    detections_topic: /detections
    request_topic: /localization/request
    status_topic: /localization/status
    map_frame: map
    base_frame: base_link
    camera_frame: camera_link
    default_timeout: 5.0
    default_scan_timeout: 20.0
    rotation_speed: 0.25
    min_detections: 3
    initial_pose_covariance: 0.05

    # Configure known AprilTag map poses here.
    # yaw is radians; yawDegrees is also supported by the node if you prefer.
    # Example:
    # tag_map_poses: '{"1":{"x":0.0,"y":0.0,"yaw":0.0},"2":{"x":5.0,"y":3.0,"yawDegrees":90}}'
    tag_map_poses: '{}'
